name: Eval tagger prompt variants

# Manual / on-demand evaluation harness. Runs the prompt-variant comparison
# script against the latest committed snapshot, uploads a markdown report
# as a workflow artifact. Triggered by hand with `gh workflow run`.

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Total jobs to sample (stratified by source)"
        required: false
        default: "40"
      variants:
        description: "Comma-separated variants (default: all)"
        required: false
        default: "v0_current,v1_differentiated,v2_few_shot"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv sync --all-extras
      - name: Run eval
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL }}
        run: |
          uv run python scripts/eval_tagger.py \
            --sample-size ${{ inputs.sample_size }} \
            --variants "${{ inputs.variants }}"
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: tagger-eval-report
          path: data/eval/
