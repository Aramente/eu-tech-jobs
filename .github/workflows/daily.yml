name: Daily pipeline

on:
  schedule:
    - cron: "0 6 * * *"  # 07:00 CET
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # required so the workflow can trigger site-deploy.yml

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv sync --all-extras
      - name: Install Chromium for Playwright fallback
        # Used by custom_page extractor when static HTML is JS-only.
        # Cached by the setup-uv step → cheap on subsequent runs.
        run: uv run python -m playwright install --with-deps chromium
      - name: Run pipeline
        run: uv run pipeline run -v
      - name: Tag jobs (DeepSeek / Mistral)
        env:
          # Repo secrets are stored as DEEPSEEK / MISTRAL — map to the
          # env-var names the pipeline code reads (*_API_KEY).
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL }}
        # Tags are now carried over from yesterday's snapshot in
        # pipeline run, so this step only tags actually-untagged jobs.
        # Limit 5000 covers a rebuild from scratch in ~3 days at our
        # ~12k corpus size, and a single day's new-job intake any day
        # after that. Cost: ~$0.50/day at DeepSeek pricing.
        run: uv run pipeline tag --limit 5000 -v
        continue-on-error: true
      - name: Compute diff + RSS + alerts
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: uv run pipeline diff -v
        continue-on-error: true
      - name: Push to Hugging Face Dataset
        env:
          HF_TOKEN: ${{ secrets.HF }}
        run: uv run pipeline publish
        continue-on-error: true
      - name: Commit data
        id: commit
        run: |
          set -e
          git fetch origin main
          TODAY=$(date -u +%Y-%m-%d)
          # If origin/main already has today's snapshot (an earlier run won
          # the race), skip — the parquets aren't auto-mergeable and we'd
          # just produce a duplicate.
          if git log origin/main -1 --format=%s | grep -qF "chore(data): daily snapshot $TODAY"; then
            echo "Today's snapshot already on origin/main — skipping commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "eu-tech-jobs-bot"
            git config user.email "actions@github.com"
            git add data/
            git commit -m "chore(data): daily snapshot $TODAY"
            # Use -X theirs so OUR data wins on conflict during rebase
            # (rebase semantics: "theirs" = the commit being applied = us).
            git pull --rebase --strategy-option=theirs origin main
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run site-deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
