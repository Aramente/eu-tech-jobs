name: Daily pipeline

on:
  schedule:
    - cron: "0 6 * * *"  # 07:00 CET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv sync --all-extras
      - name: Run pipeline
        run: uv run pipeline run -v
      - name: Tag jobs (DeepSeek / Mistral)
        env:
          # Repo secrets are stored as DEEPSEEK / MISTRAL — map to the
          # env-var names the pipeline code reads (*_API_KEY).
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL }}
        run: uv run pipeline tag --limit 1000 -v
        continue-on-error: true
      - name: Compute diff + RSS + alerts
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: uv run pipeline diff -v
        continue-on-error: true
      - name: Push to Hugging Face Dataset
        env:
          HF_TOKEN: ${{ secrets.HF }}
        run: uv run pipeline publish
        continue-on-error: true
      - name: Commit data
        id: commit
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "eu-tech-jobs-bot"
            git config user.email "actions@github.com"
            git add data/
            git commit -m "chore(data): daily snapshot $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No data changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run site-deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
